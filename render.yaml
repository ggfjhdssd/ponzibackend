services:
  - type: web
    name: ponzibackend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: FRONTEND_URL
        value: https://ponzifrontend.vercel.app

      - key: WEBHOOK_URL
        value: https://ponzibackend.onrender.com

      - key: PORT
        value: 3000
